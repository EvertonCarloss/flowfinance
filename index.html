<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowFinance</title>

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <header class="header">
    <h1 class="logo"> FlowFinance</h1>
  </header>

  <main class="container">

    <!-- Saldo -->
    <section class="card balance">
      <h2>Saldo Atual</h2>
      <p id="balance" aria-live="polite">R$ 0,00</p>
    </section>

    <!-- Resumo (Entrada e saída) -->
    <section class="summary">

      <article class="card">
        <h3>Entradas</h3>
        <p id="money-plus" class="income">R$ 0,00</p>
      </article>

      <article class="card">
        <h3>Saídas</h3>
        <p id="money-minus" class="expense">R$ 0,00</p>
      </article>
    </section>

    <!-- Lista de transações -->
    <section class="card">
      <h3>Transações</h3>
      <div class="filter">
        <button data-filter="all">Todas</button>
        <button data-filter="income">Entradas</button>
        <button data-filter="expense">Saídas</button>
      </div>
      <ul id="transaction-list" class="list"></ul>
      <button id="clear-btn">Limpar tudo</button>
    </section>

    <!-- Formulário -->
    <section class="card">
      <h3>Nova Transação</h3>

      <form id="transaction-form">

        <div class="form-control">
          <label for="text">Descrição</label>
          <input type="text" id="text" placeholder="Ex: Salário, Mercado" required>
        </div>

        <div class="form-control">
          <label for="amount">Valor</label>
          <input type="number" id="amount" placeholder="Ex: 100 ou -50" required>
        </div>

        <button type="submit">Adicionar</button>
      </form>
    </section>

  </main>
  <script type="module" src="./js/app.js"></script>
</body>

</html>
